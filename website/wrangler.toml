# Cloudflare Pages 项目配置（web-design.md §9）。
#
# 部署形态：Pages 静态托管 dist/ + Pages Functions（functions/，按文件路由）+ KV。
# 机密（OIDC_CLIENT_SECRET / SESSION_ENC_KEY）绝不写入本文件——
# 用 `wrangler pages secret put <NAME>` 或 Pages 控制台「加密环境变量」注入。
# 本地开发用 .dev.vars（已 gitignore）。

name = "lumen-website"
pages_build_output_dir = "dist"
compatibility_date = "2024-11-27"
compatibility_flags = ["nodejs_compat"]

# --- KV 命名空间绑定（web-design.md §5.4 / §9.2） ---
# id 为占位；部署前用 `wrangler kv namespace create <NAME>` 生成真实 id 后替换，
# 或在 Pages 项目设置中把命名空间绑定到 env.HANDOFF / env.SESSIONS。
# HANDOFF：handoff_code → {access_token, expires_in, refresh_token, sub, bound_challenge}
#          + 登录上下文 ctx:*；TTL≈120s（ctx≈600s），一次性消费。
# SESSIONS：desktop_session_id → {refresh_token, sub, created_at}；无 TTL，logout 删。
[[kv_namespaces]]
binding = "HANDOFF"
id = "REPLACE_WITH_HANDOFF_NAMESPACE_ID"

[[kv_namespaces]]
binding = "SESSIONS"
id = "REPLACE_WITH_SESSIONS_NAMESPACE_ID"

# --- 非机密环境变量（web-design.md §9.1） ---
# 机密（OIDC_CLIENT_SECRET / SESSION_ENC_KEY）不在此处；见文件顶部说明。
# 域名均为占位（example.com），保持可配置，部署时按真实 IdP/域名替换。
[vars]
OIDC_ISSUER = "https://auth.example.com/realms/lumen"
OIDC_AUTHORIZE_URL = "https://auth.example.com/realms/lumen/protocol/openid-connect/auth"
OIDC_TOKEN_URL = "https://auth.example.com/realms/lumen/protocol/openid-connect/token"
OIDC_USERINFO_URL = "https://auth.example.com/realms/lumen/protocol/openid-connect/userinfo"
OIDC_CLIENT_ID = "lumen-website"
OIDC_AUDIENCE = "lumen-api"
OIDC_DESKTOP_REDIRECT_URI = "https://example.com/desktop/callback"
OIDC_WEB_REDIRECT_URI = "https://example.com/auth/callback"
WEB_BASE_URL = "https://example.com"
UPDATES_LATEST_URL = "https://chat.example.com/updates/latest.json"

# 预览环境用独立 KV 命名空间与独立 IdP client / redirect 白名单，避免污染生产会话
# （web-design.md §2.3）。在 Pages 项目「预览」环境中单独绑定 *-preview 命名空间。
